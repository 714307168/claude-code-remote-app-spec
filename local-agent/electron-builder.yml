appId: com.claudecode.agent
productName: "Claude Code Agent"
asar: true

files:
  - "dist/**/*"
  - "renderer/**/*"
  - "assets/**/*"
  - "package.json"

directories:
  output: release

extraResources:
  - from: node_modules/node-pty
    to: node_modules/node-pty

win:
  target:
    - target: dir
      arch:
        - x64

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64
