appId: com.claudecode.agent
productName: "Claude Code Agent"
asar: true

files:
  - "dist/**/*"
  - "renderer/**/*"
  - "assets/**/*"
  - "package.json"

directories:
  output: release
  buildResources: assets

extraResources:
  - from: node_modules/node-pty
    to: node_modules/node-pty

win:
  icon: app-icon.ico
  artifactName: "${productName}-${version}-${arch}-setup.${ext}"
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64
