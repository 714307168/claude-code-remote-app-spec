<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:" />
  <title>Project Session</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="titlebar">
      <div class="titlebar-copy">
        <div class="titlebar-title" id="projectTitle">Project Session</div>
        <div class="titlebar-meta" id="projectMeta">Waiting for project context...</div>
      </div>
      <div class="titlebar-badges">
        <span class="titlebar-pill provider" id="providerBadge">Claude Code</span>
        <button class="titlebar-pill model" id="modelBadge" type="button" title="Switch model">Model: Auto</button>
        <span class="titlebar-pill mode" id="modeBadge">Full auto</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-button menu" id="settingsBtn" title="Settings">Settings</button>
        <button class="titlebar-button minimize" id="minimizeBtn" title="Minimize">_</button>
        <button class="titlebar-button maximize" id="maximizeBtn" title="Maximize">[]</button>
        <button class="titlebar-button close" id="closeBtn" title="Close">X</button>
      </div>
    </div>

    <main class="workspace">
      <aside class="sidebar-panel">
        <div class="sidebar-header">
          <h1 class="sidebar-title" id="projectsTitle">Projects</h1>
        </div>
        <div class="project-list" id="projectList"></div>
      </aside>

      <section class="conversation-panel">
        <div class="panel-header panel-header-workspace">
          <div class="panel-header-main">
            <div class="panel-heading panel-heading-stack panel-heading-grow">
              <h1 class="panel-title" id="sessionViewTitle">Project</h1>
              <div class="panel-status-row">
                <span class="project-status-pill idle" id="runState">Idle</span>
                <span class="panel-inline-summary" id="headerSummary">Ready for the next prompt</span>
              </div>
            </div>
          </div>

          <nav class="workbench-tabs workbench-tabs-inline" id="workbenchTabs" aria-label="Workbench views">
            <button class="workbench-tab active" id="messagesTab" type="button" data-view-switch="messages">
              <span id="messagesTabLabel">Conversation</span>
            </button>
            <button class="workbench-tab" id="activityTab" type="button" data-view-switch="activity">
              <span id="activityTabLabel">Activity</span>
              <span class="workbench-tab-badge" id="activityTabCount">0</span>
            </button>
            <button class="workbench-tab" id="cliTab" type="button" data-view-switch="cli">
              <span id="cliTabLabel">CLI</span>
              <span class="workbench-tab-badge" id="cliTabState">Idle</span>
            </button>
            <button class="workbench-tab" id="queueTab" type="button" data-view-switch="queue">
              <span id="queueTabLabel">Queue</span>
              <span class="workbench-tab-badge" id="queueTabCount">0</span>
            </button>
          </nav>
        </div>

        <div class="workspace-stage">
          <section class="messages-stage" id="messagesView">
            <div class="messages" id="messages"></div>
          </section>

          <section class="detail-dock" id="detailDock">
            <section class="workbench-view" id="activityView">
              <div class="activity-list activity-list-compact" id="activityList"></div>
            </section>

            <section class="workbench-view" id="cliView">
              <div class="cli-panel" id="cliPanel" aria-live="polite">
                <div class="cli-panel-header">
                  <div class="queue-title" id="cliTitle">CLI</div>
                  <span class="project-status-pill idle" id="cliState">Idle</span>
                </div>
                <div class="cli-trace" id="cliTrace"></div>
              </div>
            </section>

            <section class="workbench-view" id="queueView">
              <div class="queue-panel" id="queuePanel" aria-live="polite">
                <div class="queue-header">
                  <div class="queue-title" id="queueTitle">Queued prompts</div>
                  <div class="queue-count" id="queueCount">0</div>
                </div>
                <div class="queue-list" id="queueList"></div>
              </div>
            </section>
          </section>
        </div>

        <form class="composer" id="composerForm">
          <div class="composer-toolbar">
            <label class="composer-label" for="composerInput" id="composerLabel">Prompt</label>
            <div class="composer-tools">
              <button class="ghost-button attach-button" id="attachImageBtn" type="button">Image</button>
              <button class="ghost-button attach-button" id="attachFileBtn" type="button">File</button>
            </div>
          </div>
          <div class="attachment-tray" id="attachmentTray"></div>
          <textarea
            id="composerInput"
            rows="4"
            placeholder="Ask Claude Code or OpenAI Codex to inspect, edit, review, or debug this project."
          ></textarea>
          <div class="composer-actions">
            <div class="composer-hint" id="composerHint">
              Full-auto mode is enabled for both providers. Press Enter to send, Shift+Enter for a new line.
            </div>
            <div class="composer-buttons">
              <button class="danger-button" id="stopBtn" type="button">Stop</button>
              <button class="primary-button" id="sendBtn" type="submit">Send</button>
            </div>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div class="attachment-lightbox hidden" id="attachmentLightbox" aria-hidden="true">
    <div class="attachment-lightbox-backdrop"></div>
    <div class="attachment-lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="attachmentLightboxTitle">
      <div class="attachment-lightbox-header">
        <div class="attachment-lightbox-title" id="attachmentLightboxTitle"></div>
        <button class="attachment-lightbox-close" id="attachmentLightboxClose" type="button">Close</button>
      </div>
      <div class="attachment-lightbox-body">
        <img class="attachment-lightbox-image" id="attachmentLightboxImage" alt="" />
      </div>
    </div>
  </div>

  <script src="terminal.js"></script>
</body>
</html>
