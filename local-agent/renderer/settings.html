<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; padding: 24px; overflow-y: auto; }
    h1 { font-size: 18px; color: #fff; margin-bottom: 20px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 13px; text-transform: uppercase; color: #888; margin-bottom: 12px; letter-spacing: 0.5px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 12px; background: #2d2d2d; border: 1px solid #444;
      border-radius: 4px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    input:focus { border-color: #007acc; }
    select {
      width: 100%; padding: 8px 12px; background: #2d2d2d; border: 1px solid #444;
      border-radius: 4px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none;
      appearance: auto;
    }
    select:focus { border-color: #007acc; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .toggle-row label { margin-bottom: 0; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #444; border-radius: 11px; cursor: pointer; transition: 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px;
      background: #ccc; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #007acc; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .pubkey { font-family: monospace; font-size: 11px; color: #888; word-break: break-all; background: #252525; padding: 8px; border-radius: 4px; margin-top: 4px; }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }
    button {
      padding: 8px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer;
    }
    .btn-primary { background: #007acc; color: #fff; }
    .btn-primary:hover { background: #005f9e; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .status { font-size: 12px; color: #4caf50; margin-top: 8px; display: none; }
    .status.error { color: #f44336; }
  </style>
</head>
<body>
  <h1 id="title">Agent Settings</h1>

  <div class="section">
    <h2 id="langSection">Language</h2>
    <label id="langLabel">Interface Language</label>
    <select id="langSelect">
      <option value="en">English</option>
      <option value="zh">中文</option>
    </select>
  </div>

  <div class="section">
    <h2 id="launchSection">Launch</h2>
    <div class="toggle-row">
      <label id="autoStartLabel">Start on Boot</label>
      <div class="toggle">
        <input type="checkbox" id="autoStartToggle">
        <span class="slider"></span>
      </div>
    </div>
    <div class="toggle-row">
      <label id="silentLaunchLabel">Silent Launch (minimize to tray)</label>
      <div class="toggle">
        <input type="checkbox" id="silentLaunchToggle">
        <span class="slider"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2 id="serverSection">Server Connection</h2>
    <label id="serverUrlLabel">Relay Server URL</label>
    <input type="text" id="serverUrl" placeholder="ws://localhost:8080/ws">
    <label id="agentIdLabel">Agent ID</label>
    <input type="text" id="agentId" placeholder="Enter your agent ID">
    <label id="tokenLabel">Authentication Token</label>
    <input type="password" id="token" placeholder="JWT token">
  </div>

  <div class="section">
    <h2 id="e2eSection">End-to-End Encryption</h2>
    <div class="toggle-row">
      <label id="e2eLabel">Enable E2E Encryption</label>
      <div class="toggle">
        <input type="checkbox" id="e2eToggle">
        <span class="slider"></span>
      </div>
    </div>
    <label id="pubkeyLabel">Public Key</label>
    <div class="pubkey" id="pubkey">&mdash;</div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="saveBtn">Save &amp; Reconnect</button>
    <button class="btn-secondary" id="cancelBtn">Cancel</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const api = window.claudeAgent;
    let msgs = {};

    function applyI18n() {
      document.getElementById('title').textContent = msgs['settings.title'] || 'Agent Settings';
      document.getElementById('langSection').textContent = msgs['settings.language'] || 'Language';
      document.getElementById('langLabel').textContent = msgs['settings.languageLabel'] || 'Interface Language';
      document.getElementById('launchSection').textContent = msgs['settings.launch'] || 'Launch';
      document.getElementById('autoStartLabel').textContent = msgs['settings.autoStart'] || 'Start on Boot';
      document.getElementById('silentLaunchLabel').textContent = msgs['settings.silentLaunch'] || 'Silent Launch (minimize to tray)';
      document.getElementById('serverSection').textContent = msgs['settings.serverConnection'] || 'Server Connection';
      document.getElementById('serverUrlLabel').textContent = msgs['settings.relayServerUrl'] || 'Relay Server URL';
      document.getElementById('agentIdLabel').textContent = msgs['settings.agentId'] || 'Agent ID';
      document.getElementById('agentId').placeholder = msgs['settings.agentIdPlaceholder'] || 'Enter your agent ID';
      document.getElementById('tokenLabel').textContent = msgs['settings.token'] || 'Authentication Token';
      document.getElementById('token').placeholder = msgs['settings.tokenPlaceholder'] || 'JWT token';
      document.getElementById('e2eSection').textContent = msgs['settings.e2e'] || 'End-to-End Encryption';
      document.getElementById('e2eLabel').textContent = msgs['settings.e2eEnable'] || 'Enable E2E Encryption';
      document.getElementById('pubkeyLabel').textContent = msgs['settings.publicKey'] || 'Public Key';
      document.getElementById('saveBtn').textContent = msgs['settings.save'] || 'Save & Reconnect';
      document.getElementById('cancelBtn').textContent = msgs['settings.cancel'] || 'Cancel';
    }

    async function loadSettings() {
      const [config, e2e, lang, i18nMessages, appSettings] = await Promise.all([
        api.getConfig(),
        api.getE2EStatus(),
        api.getLang(),
        api.getI18nMessages(),
        api.getAppSettings(),
      ]);

      document.getElementById('serverUrl').value = config.serverUrl || '';
      document.getElementById('agentId').value = config.agentId || '';
      document.getElementById('token').value = config.token || '';
      document.getElementById('e2eToggle').checked = e2e.enabled;
      document.getElementById('pubkey').textContent = e2e.publicKey || '\u2014';
      document.getElementById('langSelect').value = lang || 'en';
      document.getElementById('autoStartToggle').checked = appSettings.autoStart || false;
      document.getElementById('silentLaunchToggle').checked = appSettings.silentLaunch || false;

      msgs = i18nMessages || {};
      applyI18n();
    }

    document.getElementById('langSelect').addEventListener('change', async (e) => {
      const lang = e.target.value;
      await api.setLang(lang);
      msgs = await api.getI18nMessages();
      applyI18n();
    });

    document.getElementById('autoStartToggle').addEventListener('change', async (e) => {
      await api.setAppSettings({ autoStart: e.target.checked });
    });

    document.getElementById('silentLaunchToggle').addEventListener('change', async (e) => {
      await api.setAppSettings({ silentLaunch: e.target.checked });
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const config = {
        serverUrl: document.getElementById('serverUrl').value.trim(),
        agentId: document.getElementById('agentId').value.trim(),
        token: document.getElementById('token').value.trim(),
      };
      const e2eEnabled = document.getElementById('e2eToggle').checked;

      try {
        await api.saveConfig(config);
        await api.setE2EEnabled(e2eEnabled);
        await api.reconnectRelay();
        showStatus(msgs['settings.saved'] || 'Settings saved. Reconnecting...', false);
        setTimeout(async () => {
          const e2e = await api.getE2EStatus();
          document.getElementById('pubkey').textContent = e2e.publicKey || '\u2014';
        }, 1000);
      } catch (err) {
        showStatus((msgs['settings.saveFailed'] || 'Failed to save: ') + err.message, true);
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.close();
    });

    function showStatus(msg, isError) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (isError ? ' error' : '');
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    loadSettings();
  </script>
</body>
</html>
