<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --success-bg: rgba(63, 185, 80, 0.12);
      --error: #f85149;
      --error-bg: rgba(248, 81, 73, 0.12);
      --warning: #d29922;
      --shadow: rgba(0, 0, 0, 0.28);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      -webkit-app-region: drag;
      height: 56px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
    }
    .titlebar-controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 8px;
    }
    .titlebar-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .titlebar-button:hover { background: var(--panel-2); }
    .titlebar-button.close:hover { background: var(--error); color: #fff; }
    .content {
      flex: 1;
      width: 100%;
      max-width: 840px;
      margin: 0 auto;
      padding: 24px;
      overflow: auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 700;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .save-indicator {
      opacity: 0;
      transition: opacity 0.2s ease;
      color: var(--success);
      background: var(--success-bg);
      border: 1px solid var(--success);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    .save-indicator.visible { opacity: 1; }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
    }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 0;
    }
    .toggle-row + .toggle-row {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .toggle-row label {
      margin: 0;
      flex: 1;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex: 0 0 auto;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #3d444d;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.2s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #fff;
      transition: 0.2s ease;
    }
    .toggle input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: var(--error);
      color: #fff;
    }
    .btn-small { padding: 6px 10px; font-size: 12px; }
    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      white-space: nowrap;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .connection-status.connected .status-dot { background: var(--success); }
    .connection-status.connecting .status-dot { background: var(--warning); }
    .connection-status.disconnected .status-dot { background: var(--error); }
    .project-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }
    .project-list:empty::before {
      content: attr(data-empty-message);
      display: block;
      padding: 24px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      background: var(--panel-2);
    }
    .project-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      align-items: center;
    }
    .project-info { min-width: 0; flex: 1; }
    .project-name { font-weight: 700; margin-bottom: 4px; }
    .project-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .project-provider-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: rgba(88, 166, 255, 0.1);
      color: var(--text);
    }
    .project-provider-badge.codex {
      background: rgba(88, 166, 255, 0.12);
      border-color: rgba(88, 166, 255, 0.28);
    }
    .project-provider-badge.claude {
      background: rgba(63, 185, 80, 0.12);
      border-color: rgba(63, 185, 80, 0.28);
    }
    .project-model-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: rgba(210, 153, 34, 0.12);
      border-color: rgba(210, 153, 34, 0.28);
      color: var(--text);
    }
    .project-path {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: Consolas, monospace;
    }
    .project-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .project-provider-select {
      min-width: 148px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    .project-model-input {
      min-width: 180px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    .add-project-form {
      display: none;
      margin-top: 14px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
    }
    .add-project-form.visible { display: block; }
    .status {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--success);
      background: var(--success-bg);
      color: var(--success);
    }
    .status.error {
      border-color: var(--error);
      background: var(--error-bg);
      color: var(--error);
    }
    .pubkey {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      font-family: Consolas, monospace;
    }
    #runtimeHint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title" id="titlebarTitle">Settings</div>
    <div class="titlebar-controls">
      <button class="titlebar-button minimize" id="minimizeBtn" title="Minimize">─</button>
      <button class="titlebar-button maximize" id="maximizeBtn" title="Maximize">□</button>
      <button class="titlebar-button close" id="closeBtn" title="Close">✕</button>
    </div>
  </div>

  <div class="content">
    <div class="header">
      <h1 id="title">Agent Settings</h1>
      <div class="header-meta">
        <div class="connection-status disconnected" id="connectionStatus">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">Disconnected</span>
        </div>
        <span class="save-indicator" id="saveIndicator"><span id="savedText">Saved</span></span>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="langSection">Language</div>
      <div class="field">
        <label id="langLabel">Interface Language</label>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="projectSection">Projects</div>
      <div class="btn-row">
        <button class="btn-primary" id="addProjectBtn">Add Project</button>
      </div>
      <div class="add-project-form" id="addProjectForm">
        <div class="field">
          <label id="projectNameLabel">Project Name</label>
          <input type="text" id="projectName" placeholder="Enter project name">
        </div>
        <div class="field">
          <label id="projectPathLabel">Project Path</label>
          <input type="text" id="projectPath" placeholder="Enter project path">
        </div>
        <div class="field">
          <label id="projectProviderLabel">CLI Provider</label>
          <select id="projectProvider">
            <option value="claude">Claude Code</option>
            <option value="codex">OpenAI Codex</option>
          </select>
        </div>
        <div class="field">
          <label id="projectModelLabel">Project Model</label>
          <input type="text" id="projectModel" placeholder="Leave blank to use the provider default">
        </div>
        <div class="btn-row">
          <button class="btn-primary btn-small" id="saveProjectBtn">Save</button>
          <button class="btn-secondary btn-small" id="cancelProjectBtn">Cancel</button>
        </div>
      </div>
      <div class="project-list" id="projectList" data-empty-message="No projects yet. Add one above to get started."></div>
    </div>

    <div class="section">
      <div class="section-title" id="launchSection">Launch</div>
      <div class="toggle-row">
        <label id="autoStartLabel" for="autoStartToggle">Start on Boot</label>
        <div class="toggle">
          <input type="checkbox" id="autoStartToggle">
          <span class="slider"></span>
        </div>
      </div>
      <div class="toggle-row">
        <label id="silentLaunchLabel" for="silentLaunchToggle">Silent Launch (minimize to tray)</label>
        <div class="toggle">
          <input type="checkbox" id="silentLaunchToggle">
          <span class="slider"></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="runtimeSection">Runtime</div>
      <div class="field">
        <label id="cliProviderLabel">CLI Provider</label>
        <select id="cliProvider">
          <option value="claude">Claude Code</option>
          <option value="codex">OpenAI Codex</option>
        </select>
        <div id="runtimeHint">Both providers run in full-auto mode with no approval prompts or click-throughs.</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="serverSection">Server Connection</div>
      <div class="field">
        <label id="serverUrlLabel">Relay Server URL</label>
        <input type="text" id="serverUrl" placeholder="http://localhost:8080">
      </div>
      <div class="field">
        <label id="usernameLabel">Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      <div class="field">
        <label id="passwordLabel">Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <div class="field">
        <label id="agentIdLabel">Agent ID</label>
        <input type="text" id="agentId" placeholder="Enter your agent ID">
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="loginBtn">Login</button>
        <button class="btn-secondary" id="reconnectBtn">Reconnect</button>
      </div>
      <div class="field" style="margin-top: 12px;">
        <label id="loginStatusLabel">Login Status</label>
        <div class="connection-status disconnected" id="loginStatus">
          <span class="status-dot"></span>
          <span class="status-text" id="loginStatusText">Not logged in</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="e2eSection">End-to-End Encryption</div>
      <div class="toggle-row">
        <label id="e2eLabel" for="e2eToggle">Enable E2E Encryption</label>
        <div class="toggle">
          <input type="checkbox" id="e2eToggle">
          <span class="slider"></span>
        </div>
      </div>
      <div class="field" style="margin-top: 10px;">
        <label id="pubkeyLabel">Public Key</label>
        <div class="pubkey" id="pubkey">&mdash;</div>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const api = window.claudeAgent;
    let currentLang = "en";
    let msgs = {};

    function formatTemplate(template, vars) {
      if (!vars) return template;
      return String(template).replace(/\{(\w+)\}/g, (_match, key) => (
        Object.prototype.hasOwnProperty.call(vars, key) ? vars[key] : ""
      ));
    }

    function msg(key, fallback, vars) {
      return formatTemplate(msgs[key] || fallback, vars);
    }

    function getErrorMessage(error) {
      if (error && typeof error.message === "string" && error.message) return error.message;
      if (typeof error === "string" && error) return error;
      return msg("common.unknownError", "Unknown error");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function inlineText(en, zh) {
      return currentLang === "zh" ? zh : en;
    }

    function modelLabel(model) {
      const value = String(model || "").trim();
      return value || inlineText("Auto", "自动");
    }

    function projectModelPlaceholder() {
      return inlineText(
        "Leave blank to use the provider default",
        "留空则使用 provider 默认模型"
      );
    }

    function applyI18n() {
      document.documentElement.lang = currentLang;
      document.title = msg("settings.title", "Agent Settings");
      document.getElementById("titlebarTitle").textContent = msg("settings.titlebarTitle", "Settings");
      document.getElementById("title").textContent = msg("settings.title", "Agent Settings");
      document.getElementById("savedText").textContent = msg("settings.saved.short", "Saved");
      document.getElementById("langSection").textContent = msg("settings.language", "Language");
      document.getElementById("langLabel").textContent = msg("settings.languageLabel", "Interface Language");
      document.getElementById("projectSection").textContent = msg("settings.projects", "Projects");
      document.getElementById("addProjectBtn").textContent = msg("settings.addProject", "Add Project");
      document.getElementById("projectNameLabel").textContent = msg("settings.projectName", "Project Name");
      document.getElementById("projectName").placeholder = msg("settings.projectNamePlaceholder", "Enter project name");
      document.getElementById("projectPathLabel").textContent = msg("settings.projectPath", "Project Path");
      document.getElementById("projectPath").placeholder = msg("settings.projectPathPlaceholder", "Enter project path");
      document.getElementById("projectProviderLabel").textContent = msg("settings.cliProvider", "CLI Provider");
      document.getElementById("projectModelLabel").textContent = inlineText("Project Model", "项目模型");
      document.getElementById("projectModel").placeholder = projectModelPlaceholder();
      document.getElementById("projectList").setAttribute("data-empty-message", msg("settings.projectEmpty", "No projects yet. Add one above to get started."));
      document.getElementById("saveProjectBtn").textContent = msg("settings.save", "Save");
      document.getElementById("cancelProjectBtn").textContent = msg("settings.cancel", "Cancel");
      document.getElementById("launchSection").textContent = msg("settings.launch", "Launch");
      document.getElementById("autoStartLabel").textContent = msg("settings.autoStart", "Start on Boot");
      document.getElementById("silentLaunchLabel").textContent = msg("settings.silentLaunch", "Silent Launch (minimize to tray)");
      document.getElementById("runtimeSection").textContent = msg("settings.runtime", "Runtime");
      document.getElementById("cliProviderLabel").textContent = msg("settings.cliProvider", "CLI Provider");
      document.getElementById("runtimeHint").textContent = msg("settings.runtimeHint", "Both providers run in full-auto mode with no approval prompts or click-throughs.");
      document.getElementById("serverSection").textContent = msg("settings.serverConnection", "Server Connection");
      document.getElementById("serverUrlLabel").textContent = msg("settings.relayServerUrl", "Relay Server URL");
      document.getElementById("usernameLabel").textContent = msg("settings.username", "Username");
      document.getElementById("username").placeholder = msg("settings.usernamePlaceholder", "Enter username");
      document.getElementById("passwordLabel").textContent = msg("settings.password", "Password");
      document.getElementById("password").placeholder = msg("settings.passwordPlaceholder", "Enter password");
      document.getElementById("agentIdLabel").textContent = msg("settings.agentId", "Agent ID");
      document.getElementById("agentId").placeholder = msg("settings.agentIdPlaceholder", "Enter your agent ID");
      document.getElementById("loginBtn").textContent = msg("settings.login", "Login");
      document.getElementById("reconnectBtn").textContent = msg("settings.reconnect", "Reconnect");
      document.getElementById("loginStatusLabel").textContent = msg("settings.loginStatus", "Login Status");
      document.getElementById("e2eSection").textContent = msg("settings.e2e", "End-to-End Encryption");
      document.getElementById("e2eLabel").textContent = msg("settings.e2eEnable", "Enable E2E Encryption");
      document.getElementById("pubkeyLabel").textContent = msg("settings.publicKey", "Public Key");
      document.getElementById("minimizeBtn").title = msg("common.minimize", "Minimize");
      document.getElementById("maximizeBtn").title = msg("common.maximize", "Maximize");
      document.getElementById("closeBtn").title = msg("common.close", "Close");
    }

    function flashSaved() {
      const el = document.getElementById("saveIndicator");
      el.classList.add("visible");
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove("visible"), 1500);
    }

    async function saveConnectionConfig() {
      await api.saveConfig({
        serverUrl: document.getElementById("serverUrl").value.trim(),
        username: document.getElementById("username").value.trim(),
        agentId: document.getElementById("agentId").value.trim(),
        cliProvider: document.getElementById("cliProvider").value,
      });
      flashSaved();
    }

    async function updateLoginStatus() {
      try {
        const config = await api.getConfig();
        const statusEl = document.getElementById("loginStatus");
        const textEl = document.getElementById("loginStatusText");
        if (config.token) {
          statusEl.className = "connection-status connected";
          textEl.textContent = msg("settings.loggedIn", "Logged in");
        } else {
          statusEl.className = "connection-status disconnected";
          textEl.textContent = msg("settings.loggedOut", "Not logged in");
        }
      } catch (error) {
        console.error("Failed to update login status:", error);
      }
    }

    async function updateConnectionStatus() {
      try {
        const status = await api.getConnectionStatus();
        const statusEl = document.getElementById("connectionStatus");
        const textEl = document.getElementById("statusText");
        statusEl.className = "connection-status " + status.state;
        const statusTexts = {
          connected: msg("settings.status.connected", "Connected"),
          connecting: msg("settings.status.connecting", "Connecting"),
          disconnected: msg("settings.status.disconnected", "Disconnected"),
        };
        textEl.textContent = statusTexts[status.state] || statusTexts.disconnected;
      } catch (error) {
        console.error("Failed to get connection status:", error);
      }
    }

    function showStatus(text, isError) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className = "status" + (isError ? " error" : "");
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 3000);
    }

    async function loadProjects() {
      try {
        const projects = await api.getProjects();
        const listEl = document.getElementById("projectList");
        if (!projects || projects.length === 0) {
          listEl.innerHTML = "";
          return;
        }
        const providerLabel = (provider) => provider === "codex" ? "OpenAI Codex" : "Claude Code";
        listEl.innerHTML = projects.map((project) => `
          <div class="project-item">
            <div class="project-info">
              <div class="project-name">${escapeHtml(project.name)}</div>
              <div class="project-meta-row">
                <span class="project-provider-badge ${escapeHtml(project.cliProvider || "claude")}">${escapeHtml(providerLabel(project.cliProvider || "claude"))}</span>
                <span class="project-model-badge">${escapeHtml(modelLabel(project.cliModel))}</span>
              </div>
              <div class="project-path">${escapeHtml(project.path)}</div>
            </div>
            <div class="project-actions">
              <select class="project-provider-select" onchange="updateProjectProvider('${project.id}', this.value)">
                <option value="claude" ${(project.cliProvider || "claude") === "claude" ? "selected" : ""}>Claude Code</option>
                <option value="codex" ${(project.cliProvider || "claude") === "codex" ? "selected" : ""}>OpenAI Codex</option>
              </select>
              <input
                class="project-model-input"
                type="text"
                value="${escapeHtml(project.cliModel || "")}"
                placeholder="${escapeHtml(projectModelPlaceholder())}"
                onblur="updateProjectModel('${project.id}', this.value)"
                onkeydown="handleProjectModelKey(event, '${project.id}', this)"
              >
              <button class="btn-secondary btn-small" onclick="openProject('${project.id}')">${escapeHtml(msg("settings.projectOpen", "Open"))}</button>
              <button class="btn-danger btn-small" onclick="deleteProject('${project.id}')">${escapeHtml(msg("settings.projectDelete", "Delete"))}</button>
            </div>
          </div>
        `).join("");
      } catch (error) {
        console.error("Failed to load projects:", error);
      }
    }

    async function openProject(projectId) {
      try {
        await api.openProject(projectId);
      } catch (error) {
        showStatus(msg("settings.projectOpenFailed", "Failed to open project: {error}", { error: getErrorMessage(error) }), true);
      }
    }

    async function deleteProject(projectId) {
      if (!confirm(msg("settings.projectDeleteConfirm", "Delete this project?"))) return;
      try {
        await api.deleteProject(projectId);
        await loadProjects();
        flashSaved();
      } catch (error) {
        showStatus(msg("settings.projectDeleteFailed", "Failed to delete project: {error}", { error: getErrorMessage(error) }), true);
      }
    }

    async function updateProjectConfig(projectId, updates) {
      try {
        const result = await api.updateProject({ projectId, updates });
        if (!result || result.success === false) {
          showStatus(msg("settings.saveFailed", "Failed: {error}", { error: result?.error || msg("common.unknownError", "Unknown error") }), true);
          await loadProjects();
          return false;
        }
        await loadProjects();
        flashSaved();
        return true;
      } catch (error) {
        showStatus(msg("settings.saveFailed", "Failed: {error}", { error: getErrorMessage(error) }), true);
        await loadProjects();
        return false;
      }
    }

    async function updateProjectProvider(projectId, cliProvider) {
      await updateProjectConfig(projectId, { cliProvider });
    }

    async function updateProjectModel(projectId, cliModel) {
      await updateProjectConfig(projectId, {
        cliModel: String(cliModel || "").trim() || null,
      });
    }

    function handleProjectModelKey(event, projectId, input) {
      if (event.key !== "Enter") {
        return;
      }
      event.preventDefault();
      input.blur();
      void updateProjectModel(projectId, input.value);
    }

    async function syncLanguage(lang, messages) {
      currentLang = lang || "en";
      msgs = messages || {};
      document.getElementById("langSelect").value = currentLang;
      applyI18n();
      await Promise.all([loadProjects(), updateConnectionStatus(), updateLoginStatus()]);
    }

    async function loadSettings() {
      const [config, e2e, lang, i18nMessages, appSettings] = await Promise.all([
        api.getConfig(),
        api.getE2EStatus(),
        api.getLang(),
        api.getI18nMessages(),
        api.getAppSettings(),
      ]);
      document.getElementById("serverUrl").value = config.serverUrl || "";
      document.getElementById("username").value = config.username || "";
      document.getElementById("agentId").value = config.agentId || "";
      document.getElementById("cliProvider").value = config.cliProvider || "claude";
      document.getElementById("projectProvider").value = config.cliProvider || "claude";
      document.getElementById("projectModel").value = "";
      document.getElementById("e2eToggle").checked = e2e.enabled;
      document.getElementById("pubkey").textContent = e2e.publicKey || "—";
      document.getElementById("autoStartToggle").checked = appSettings.autoStart || false;
      document.getElementById("silentLaunchToggle").checked = appSettings.silentLaunch || false;
      await syncLanguage(lang || "en", i18nMessages || {});
    }

    ["serverUrl", "username", "agentId"].forEach((id) => {
      document.getElementById(id).addEventListener("blur", () => { void saveConnectionConfig(); });
    });

    document.getElementById("cliProvider").addEventListener("change", () => {
      document.getElementById("projectProvider").value = document.getElementById("cliProvider").value;
      void saveConnectionConfig();
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const serverUrl = document.getElementById("serverUrl").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const agentId = document.getElementById("agentId").value.trim();
      if (!serverUrl || !username || !password || !agentId) {
        showStatus(msg("settings.fillRequired", "Please fill in all fields."), true);
        return;
      }
      try {
        await saveConnectionConfig();
        const result = await api.login({ username, password, agentId });
        if (result.success) {
          showStatus(msg("settings.loginSuccess", "Login successful"), false);
          document.getElementById("password").value = "";
          await updateLoginStatus();
          setTimeout(() => api.reconnectRelay(), 500);
        } else {
          showStatus(msg("settings.loginFailed", "Login failed: {error}", {
            error: result.error || msg("common.unknownError", "Unknown error"),
          }), true);
        }
      } catch (error) {
        showStatus(msg("settings.loginFailed", "Login failed: {error}", { error: getErrorMessage(error) }), true);
      }
    });

    document.getElementById("langSelect").addEventListener("change", async (event) => {
      currentLang = event.target.value;
      await api.setLang(currentLang);
      msgs = await api.getI18nMessages();
      applyI18n();
      await Promise.all([loadProjects(), updateConnectionStatus(), updateLoginStatus()]);
      flashSaved();
    });

    document.getElementById("autoStartToggle").addEventListener("change", async (event) => {
      await api.setAppSettings({ autoStart: event.target.checked });
      flashSaved();
    });

    document.getElementById("silentLaunchToggle").addEventListener("change", async (event) => {
      await api.setAppSettings({ silentLaunch: event.target.checked });
      flashSaved();
    });

    document.getElementById("e2eToggle").addEventListener("change", async (event) => {
      await api.setE2EEnabled(event.target.checked);
      flashSaved();
      setTimeout(async () => {
        const e2e = await api.getE2EStatus();
        document.getElementById("pubkey").textContent = e2e.publicKey || "—";
      }, 500);
    });

    document.getElementById("reconnectBtn").addEventListener("click", async () => {
      try {
        await saveConnectionConfig();
        await api.reconnectRelay();
        showStatus(msg("settings.saved", "Reconnecting..."), false);
        setTimeout(async () => {
          const e2e = await api.getE2EStatus();
          document.getElementById("pubkey").textContent = e2e.publicKey || "—";
          await Promise.all([updateConnectionStatus(), updateLoginStatus()]);
        }, 1000);
      } catch (error) {
        showStatus(msg("settings.saveFailed", "Failed: {error}", { error: getErrorMessage(error) }), true);
      }
    });

    document.getElementById("addProjectBtn").addEventListener("click", () => {
      document.getElementById("addProjectForm").classList.add("visible");
      document.getElementById("projectName").focus();
    });

    document.getElementById("cancelProjectBtn").addEventListener("click", () => {
      document.getElementById("addProjectForm").classList.remove("visible");
      document.getElementById("projectName").value = "";
      document.getElementById("projectPath").value = "";
      document.getElementById("projectProvider").value = document.getElementById("cliProvider").value || "claude";
      document.getElementById("projectModel").value = "";
    });

    document.getElementById("saveProjectBtn").addEventListener("click", async () => {
      const name = document.getElementById("projectName").value.trim();
      const path = document.getElementById("projectPath").value.trim();
      const cliProvider = document.getElementById("projectProvider").value;
      const cliModel = document.getElementById("projectModel").value.trim();
      if (!name || !path) {
        showStatus(msg("settings.projectRequired", "Project name and path are required."), true);
        return;
      }
      try {
        await api.addProject({ name, path, cliProvider, cliModel: cliModel || null });
        document.getElementById("addProjectForm").classList.remove("visible");
        document.getElementById("projectName").value = "";
        document.getElementById("projectPath").value = "";
        document.getElementById("projectProvider").value = document.getElementById("cliProvider").value || "claude";
        document.getElementById("projectModel").value = "";
        await loadProjects();
        flashSaved();
      } catch (error) {
        showStatus(msg("settings.projectAddFailed", "Failed to add project: {error}", { error: getErrorMessage(error) }), true);
      }
    });

    if (typeof api.onLangChanged === "function") {
      api.onLangChanged((payload) => { void syncLanguage(payload.lang, payload.messages); });
    }

    if (typeof api.onProjectsChanged === "function") {
      api.onProjectsChanged(() => { void loadProjects(); });
    }

    document.getElementById("minimizeBtn").addEventListener("click", () => api.minimizeWindow());
    document.getElementById("maximizeBtn").addEventListener("click", () => api.maximizeWindow());
    document.getElementById("closeBtn").addEventListener("click", () => api.closeWindow());

    async function initialize() {
      await loadSettings();
      setInterval(updateConnectionStatus, 3000);
    }

    void initialize();
  </script>
</body>
</html>
